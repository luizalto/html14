n.callMethod.apply(n,arguments):n.queue.push(arguments)};
if(!f._fbq)f._fbq=n;n.push=n;n.loaded=!0;n.version='2.0';
n.queue=[];t=b.createElement(e);t.async=!0;
t.src=v;s=b.getElementsByTagName(e)[0];
s.parentNode.insertBefore(t,s)
}(window, document,'script','https://connect.facebook.net/en_US/fbevents.js');

// ===== USER ID =====
function gerarId(){
  const chars = 'abcdefghijklmnopqrstuvwxyz0123456789'
  let id = ''
  for(let i=0;i<8;i++){
    id += chars.charAt(Math.floor(Math.random()*chars.length))
  }
  return id
}

function getUserId(){
  let id = localStorage.getItem('user_id')
  if(!id){
    id = gerarId()
    localStorage.setItem('user_id', id)
  }
  return id
}

const userId = getUserId()

fbq('init','799819532599997',{external_id:userId})
fbq('track','PageView',{external_id:userId})

// ===== EVENTOS =====
function enviarEvento(valor){
  if(!valor) return
  const nome = valor.replace(/[^a-zA-Z0-9]/g, "")
  try{
    fbq('trackCustom', nome, { external_id: userId })
  }catch{}
}
</script>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

</head>

<body>

<script>
(async function(){

// ===== PARAMS =====
const params = new URLSearchParams(window.location.search)
let LINK = null, UC = null

const raw = params.get("dest")

if(raw && raw.includes("|||")){
  const p = raw.split("|||")
  LINK = p[0]
  UC   = p[1]
} else {
  LINK = params.get("dest")
  UC   = params.get("uc")
}

if(!LINK || !UC){
  throw new Error("Parâmetros inválidos")
}

// ===== RESUMO ORIGEM =====
function resumirOrigem(texto){
  let plataforma = "U"
  let posicao = "U"

  if(texto.includes("ig")) plataforma = "I"
  else if(texto.includes("fb")) plataforma = "F"

  if(texto.includes("stories")) posicao = "S"
  else if(texto.includes("reels")) posicao = "R"
  else if(texto.includes("feed")) posicao = "F"

  return plataforma + posicao
}

// ===== LIMPAR + RESUMIR UC =====
let baseUC = UC.toLowerCase()
let origemResumo = resumirOrigem(baseUC)

// remove texto grande
baseUC = baseUC.replace(/instagram|facebook|stories|reels|feed|ig|fb/gi, "")

// limpa
baseUC = baseUC.replace(/[^a-zA-Z0-9]/g, "").slice(0, 20)

// adiciona resumo
baseUC = baseUC + origemResumo

// ===== TEMPO =====
const tempoTag = "T1"

// ===== VELOCIDADE =====
function classificar(mbps){
  if(mbps <= 0.5) return 1
  if(mbps <= 1) return 3
  if(mbps <= 5) return 6
  if(mbps <= 10) return 8
  if(mbps <= 20) return 10
  return 14
}

async function medirVelocidade(){
  try{
    const downlink = navigator.connection?.downlink || 5
    return "N" + classificar(downlink)
  } catch {
    return "N6"
  }
}

// ===== BATERIA =====
async function medirBateria(){
  try{
    const bat = await navigator.getBattery()
    const pct = Math.round(bat.level * 10)
    const nivel = pct < 2 ? "BL" : "B" + pct
    const carregando = bat.charging ? "C1" : "C0"

    return { bateria: nivel, carregando: carregando }
  } catch {
    return { bateria: "", carregando: "" }
  }
}

// ===== MOVIMENTO =====
function medirMovimento(){
  return new Promise(resolve => {
    let detectado = false
    function handler(e){
      const acc = e.accelerationIncludingGravity
      if(!acc) return
      const total = Math.abs(acc.x||0)+Math.abs(acc.y||0)+Math.abs(acc.z||0)
      if(total > 15) detectado = true
    }
    if(typeof DeviceMotionEvent !== "undefined"){
      window.addEventListener("devicemotion", handler)
      setTimeout(() => {
        window.removeEventListener("devicemotion", handler)
        resolve(detectado ? "M1" : "M0")
      }, 120)
    } else {
      resolve("M0")
    }
  })
}

// ===== RAM =====
function medirRAM(){
  const ram = navigator.deviceMemory || 4
  if(ram <= 2) return "R1"
  if(ram <= 4) return "R2"
  if(ram <= 8) return "R3"
  return "R4"
}

// ===== WEBRTC =====
function medirWebRTC(){
  return new Promise(resolve => {
    try {
      const pc = new RTCPeerConnection({ iceServers: [] })
      const ips = new Set()

      pc.onicecandidate = e => {
        if(!e || !e.candidate){
          analisar()
          return
        }
        const m = e.candidate.candidate.match(/(\d+\.\d+\.\d+\.\d+)/)
        if(m) ips.add(m[1])
      }

      function analisar(){
        let tag = "RU"
        for(const ip of ips){
          if(/^10\./.test(ip)) return resolve("RC")
          if(/^172\.(1[6-9]|2\d|3[01])\./.test(ip)) return resolve("RV")
          if(/^192\.168\./.test(ip)) tag = "RH"
        }
        resolve(tag)
      }

      pc.createDataChannel('')
      pc.createOffer().then(o => pc.setLocalDescription(o))
    } catch {
      resolve("RU")
    }
  })
}

// ===== OUTROS =====
const tema = window.matchMedia('(prefers-color-scheme: dark)').matches ? "D" : "L"
const ua = navigator.userAgent || ""
const device = /android/i.test(ua) ? "A" : /iphone|ipad|ipod/i.test(ua) ? "I" : "O"
const vib = navigator.vibrate ? "V1" : "V0"

const conexao = (() => {
  const c = navigator.connection
  if(!c) return "U"
  if(c.type==="wifi") return "W"
  if(c.type==="cellular") return "M"
  return "U"
})()

// ===== EXEC =====
const [velTag, batObj, movimento, redeTag] = await Promise.all([
  medirVelocidade(),
  medirBateria(),
  medirMovimento(),
  medirWebRTC()
])

const ram = medirRAM()

// ===== EVENTOS =====
enviarEvento(tempoTag)
enviarEvento(velTag)
enviarEvento(batObj.bateria)
enviarEvento(batObj.carregando)
enviarEvento(tema)
enviarEvento(ram)
enviarEvento(vib)
enviarEvento(device)
enviarEvento(conexao)
enviarEvento(movimento)
enviarEvento(redeTag)

// ===== UC FINAL =====
let finalUC = (
  baseUC +
  tempoTag +
  velTag +
  batObj.bateria +
  batObj.carregando +
  tema +
  ram +
  vib +
  device +
  conexao +
  movimento +
  redeTag +
  "ID" + userId
).replace(/[^a-zA-Z0-9]/g, "").slice(0, 48)

// ===== REDIRECT =====
const url = `https://shopee-utm-tracker.onrender.com/?link=${encodeURIComponent(LINK)}&uc=${finalUC}`

window.location.href = url

})();
</script>

</body>
</html>
