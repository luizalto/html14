n.callMethod.apply(n,arguments):n.queue.push(arguments)};
if(!f._fbq)f._fbq=n;n.push=n;n.loaded=!0;n.version='2.0';
n.queue=[];t=b.createElement(e);t.async=!0;
t.src=v;s=b.getElementsByTagName(e)[0];
s.parentNode.insertBefore(t,s)
}(window, document,'script','https://connect.facebook.net/en_US/fbevents.js');

// ===== EXTERNAL ID (8 CHARS) =====
function gerarId(){
  const chars = 'abcdefghijklmnopqrstuvwxyz0123456789'
  let id = ''
  for(let i=0;i<8;i++){
    id += chars.charAt(Math.floor(Math.random()*chars.length))
  }
  return id
}

function getUserId(){
  let id = localStorage.getItem('user_id')
  if(!id){
    id = gerarId()
    localStorage.setItem('user_id', id)
  }
  return id
}

const userId = getUserId()

fbq('init','799819532599997',{external_id:userId})
fbq('track','PageView',{external_id:userId})

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

</head>

<body>

<script>
(function(){

// ===== FLAGS =====
const ENABLE_TELA   = false
const ENABLE_ORIGEM = false
const ENABLE_GIRO   = false

// ===== PARAMS =====
const params = new URLSearchParams(window.location.search)
let LINK = null, UC = null

const raw = params.get("dest")

if(raw && raw.includes("|||")){
  const p = raw.split("|||")
  LINK = p[0]
  UC   = p[1]
} else {
  LINK = params.get("dest")
  UC   = params.get("uc")
}

if(!LINK || !UC){
  throw new Error("Parâmetros inválidos")
}

// ===== TIMEOUT =====
function timeout(promise, ms, fallback){
  return Promise.race([
    promise,
    new Promise(res => setTimeout(() => res(fallback), ms))
  ])
}

// ===== VELOCIDADE =====
function classificar(mbps){
  if(mbps <= 0.5) return 1
  if(mbps <= 0.8) return 2
  if(mbps <= 1)   return 3
  if(mbps <= 2)   return 4
  if(mbps <= 4)   return 5
  if(mbps <= 6)   return 6
  if(mbps <= 10)  return 7
  if(mbps <= 15)  return 8
  if(mbps <= 20)  return 9
  if(mbps <= 30)  return 10
  if(mbps <= 40)  return 11
  if(mbps <= 50)  return 12
  if(mbps <= 60)  return 13
  return 14
}

async function medirVelocidade(){
  try{
    const start = performance.now()
    const res   = await fetch("https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js", {cache:"no-store"})
    const blob  = await res.blob()
    const duration = (performance.now() - start) / 1000
    const bits     = blob.size * 8
    const mbps     = (bits / duration) / (1024 * 1024)
    return "N" + classificar(mbps)
  } catch {
    return "N6"
  }
}

// ===== BATERIA =====
async function medirBateria(){
  try{
    const bat      = await navigator.getBattery()
    const pct      = Math.round(bat.level * 10)
    const nivel    = pct < 2 ? "BL" : "B" + pct
    const carregando = bat.charging ? "C1" : "C0"
    return nivel + carregando
  } catch {
    return ""
  }
}

// ===== MOVIMENTO =====
function medirMovimento(){
  return new Promise(resolve => {
    let detectado = false

    function handler(e){
      const acc = e.accelerationIncludingGravity
      if(!acc) return
      const total = Math.abs(acc.x||0) + Math.abs(acc.y||0) + Math.abs(acc.z||0)
      if(total > 15) detectado = true
    }

    if(typeof DeviceMotionEvent !== "undefined"){
      window.addEventListener("devicemotion", handler)
      setTimeout(() => {
        window.removeEventListener("devicemotion", handler)
        resolve(detectado ? "M1" : "M0")
      }, 120)
    } else {
      resolve("M0")
    }
  })
}

// ===== RAM =====
function medirRAM(){
  const ram = navigator.deviceMemory || 0
  if(ram <= 2)  return "R1"
  if(ram <= 4)  return "R2"
  if(ram <= 8)  return "R3"
  if(ram <= 12) return "R4"
  return "R5"
}

// ===== WEBRTC — tipo de rede =====
// Detecta o IP local via WebRTC sem nenhuma permissão do usuário.
// RH = doméstico (192.168.x.x)
// RC = corporativo (10.x.x.x)
// RV = VPN provável (172.16–31.x.x)
// RU = não detectado
function medirWebRTC(){
  return new Promise(resolve => {
    try {
      const pc  = new RTCPeerConnection({ iceServers: [] })
      const ips = new Set()
      let encerrado = false

      function encerrar(){
        if(encerrado) return
        encerrado = true
        try { pc.close() } catch {}

        const lista = [...ips]
        let tag = "RU"

        for(const ip of lista){
          if(/^10\./.test(ip)){
            tag = "RC"; break
          }
          if(/^172\.(1[6-9]|2\d|3[01])\./.test(ip)){
            tag = "RV"; break
          }
          if(/^192\.168\./.test(ip)){
            tag = "RH"
            // não faz break — continua procurando RC ou RV
          }
        }

        resolve(tag)
      }

      pc.onicecandidate = e => {
        if(!e || !e.candidate){
          encerrar()
          return
        }
        const m = e.candidate.candidate.match(/(\d+\.\d+\.\d+\.\d+)/)
        if(m) ips.add(m[1])
      }

      pc.createDataChannel('')
      pc.createOffer()
        .then(o => pc.setLocalDescription(o))
        .catch(() => resolve("RU"))

    } catch {
      resolve("RU")
    }
  })
}

// ===== OUTROS =====
const tema = window.matchMedia('(prefers-color-scheme: dark)').matches ? "D" : "L"

const ua     = navigator.userAgent || ""
const device = /android/i.test(ua) ? "A" : /iphone|ipad|ipod/i.test(ua) ? "I" : "O"

const vib = navigator.vibrate ? "V1" : "V0"

const conexao = (()=>{
  const c = navigator.connection
  if(!c)              return "U"
  if(c.type==="wifi") return "W"
  if(c.type==="cellular") return "M"
  return "U"
})()

function medirTela(){
  const w = window.screen.width
  if(w < 480)  return "S1"
  if(w < 768)  return "S2"
  if(w < 1024) return "S3"
  return "S4"
}

function medirOrigem(){
  const ref = document.referrer || ""
  return ref === "" ? "DR" : "OT"
}

function medirGyro(){
  return typeof DeviceMotionEvent !== "undefined" ? "G1" : "G0"
}

// ===== EXEC =====
async function iniciar(){

  const tempoTag = "T1"

  const velPromise = timeout(medirVelocidade(), 120, "N6")
  const batPromise = timeout(medirBateria(),    120, "")
  const movPromise = timeout(medirMovimento(),  120, "M0")
  const rtcPromise = timeout(medirWebRTC(),     800, "RU")
  // WebRTC precisa de mais tempo que os outros (até 800ms)
  // mas roda em paralelo, então não atrasa o redirect

  const [velTag, bat, movimento, redeTag] = await Promise.all([
    velPromise,
    batPromise,
    movPromise,
    rtcPromise
  ])

  const tela   = ENABLE_TELA   ? medirTela()   : ""
  const origem = ENABLE_ORIGEM ? medirOrigem() : ""
  const gyro   = ENABLE_GIRO   ? medirGyro()   : ""

  const ram = medirRAM()

  let baseUC = UC.replace(/[^a-zA-Z0-9]/g, "").slice(0, 20)

  let finalUC = (
    baseUC    +
    tempoTag  +
    velTag    +
    bat       +
    tema      +
    tela      +
    origem    +
    ram       +
    gyro      +
    vib       +
    device    +
    conexao   +
    movimento +
    redeTag   +   // <-- novo: RH / RC / RV / RU
    "ID" + userId
  ).replace(/[^a-zA-Z0-9]/g, "").slice(0, 48)

  const url = `https://shopee-utm-tracker.onrender.com/?link=${encodeURIComponent(LINK)}&uc=${finalUC}`

  window.location.href = url
}

iniciar()

})();
</script>
