<!DOCTYPE html>
<html lang="pt-br">
<head>
<script>
// ========== CONFIGURAÇÕES INICIAIS ==========
const CONFIG = {
  medirGeo: true,           // Geolocalização por IP
  medirBateria: true,       // Nível de bateria
  enviarEventosMeta: true,
  enviarGoogleSheets: true,
  coletarPlacementSource: true,
  coletarTemporais: true,
  debug: false
};

// ========== FACEBOOK PIXEL ==========
!function(f,b,e,v,n,t,s){
if(f.fbq)return;n=f.fbq=function(){n.callMethod?
n.callMethod.apply(n,arguments):n.queue.push(arguments)};
if(!f._fbq)f._fbq=n;n.push=n;n.loaded=!0;n.version='2.0';
n.queue=[];t=b.createElement(e);t.async=!0;
t.src=v;s=b.getElementsByTagName(e)[0];
s.parentNode.insertBefore(t,s)
}(window, document,'script','https://connect.facebook.net/en_US/fbevents.js');

function gerarId(){
  const chars = 'abcdefghijklmnopqrstuvwxyz0123456789'
  let id = ''
  for(let i = 0; i < 8; i++) id += chars.charAt(Math.floor(Math.random() * chars.length))
  return id
}
function getUserId(){
  let id = localStorage.getItem('user_id')
  if(!id || id.length !== 8){ id = gerarId(); localStorage.setItem('user_id', id) }
  return id
}
const userId = getUserId()

fbq('init', '977141014678498', { external_id: userId })
fbq('track', 'PageView', { external_id: userId })

function enviarEvento(valor){
  if(!CONFIG.enviarEventosMeta) return
  if(!valor) return
  const nome = valor.replace(/[^a-zA-Z0-9]/g, "")
  if(!nome) return
  try { fbq('trackCustom', nome, { external_id: userId }) } catch {}
}
</script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>
<script>
(async function(){

const params = new URLSearchParams(window.location.search)

const ENABLE_PARIDADE = (() => {
  const urlParam = params.get("paridade")
  if(urlParam !== null) return urlParam === "1"
  return true
})()

const SHEETS_URL = "https://script.google.com/macros/s/AKfycby_ejOA_7nbW9nVFwkPyJxTSXTMEnbP8Jn6ENMtHYyZm9Ua6eERRWOQeQ7EuD133YGq/exec"

function timeout(promise, ms, fallback){
  return Promise.race([promise, new Promise(res => setTimeout(() => res(fallback), ms))])
}

// =========================================================
// PARAMS LINK + UC
// =========================================================
let LINK = null, UC = null
const raw = params.get("dest")
if(raw && raw.includes("|||")){
  const p = raw.split("|||"); LINK = p[0]; UC = p[1]
} else {
  LINK = params.get("dest"); UC = params.get("uc")
}
if(!LINK || !UC) throw new Error("Parametros invalidos")

// =========================================================
// PLACEMENT + SOURCE
// =========================================================
let placementTag = "PU", sourceTag = "SU"
if(CONFIG.coletarPlacementSource){
  const plRaw  = (params.get("pl")  || "").toLowerCase().trim()
  const srcRaw = (params.get("src") || "").toLowerCase().trim()

  function classPlacement(p){
    if(!p || p.includes("{{")) return "PU"
    const n = p.replace(/[_\s-]/g, "")
    if(n.includes("profilereels"))  return "PP"
    if(n.includes("reelsoverlay"))  return "PV"
    if(n.includes("reels"))         return "PR"
    if(n.includes("stories"))       return "PS"
    if(n.includes("explorehome"))   return "PH"
    if(n.includes("explore"))       return "PE"
    if(n.includes("search"))        return "PQ"
    if(n.includes("marketplace"))   return "PM"
    if(n.includes("instream"))      return "PI"
    if(n.includes("video"))         return "PI"
    if(n.includes("messenger"))     return "PG"
    if(n.includes("audience"))      return "PA"
    if(n.includes("feed"))          return "PF"
    return "PO"
  }
  function classSrc(s){
    if(!s || s.includes("{{")) return "SU"
    if(s === "ig")  return "SI"
    if(s === "fb")  return "SF"
    if(s === "msg") return "SM"
    if(s === "an")  return "SA"
    return "SU"
  }
  placementTag = classPlacement(plRaw)
  sourceTag    = classSrc(srcRaw)
}

// =========================================================
// GEOLOCALIZAÇÃO (opcional)
// =========================================================
async function fetchGeoFromAPI(url) {
  const resp = await fetch(url, { signal: AbortSignal.timeout(2000) })
  if (!resp.ok) throw new Error("bad response")
  return resp.json()
}
function extrairGeo(d) {
  const rc = (d.region_code || "").replace(/[^A-Za-z]/g, "").toUpperCase()
  const state = rc.length === 2 ? rc : "ZZ"
  const cityRaw = (d.city || "")
    .normalize("NFD").replace(/[\u0300-\u036f]/g, "")
    .replace(/[^a-zA-Z]/g, "")
    .toUpperCase()
  const city = cityRaw.slice(0, 6) || "ZZ"
  return { state, city, city_full: d.city || "", state_full: d.region || "" }
}
const GEO_CACHE_KEY = "geo_cache"
const GEO_CACHE_TTL = 30 * 60 * 1000
async function medirGeo() {
  if(!CONFIG.medirGeo) return { state: "ZZ", city: "ZZ", city_full: "", state_full: "" }
  try {
    const cached = JSON.parse(sessionStorage.getItem(GEO_CACHE_KEY))
    if (cached && cached.expires > Date.now()) return cached.data
  } catch {}
  const apis = [
    () => fetchGeoFromAPI("https://ipapi.co/json/"),
    () => fetchGeoFromAPI("https://ipwho.is/"),
    () => fetchGeoFromAPI("https://freeipapi.com/api/json")
  ]
  let data = null
  for (const apiFn of apis) {
    try {
      const json = await apiFn()
      data = extrairGeo(json)
      if (data.state !== "ZZ" || data.city !== "ZZ") break
    } catch {}
  }
  if (!data) {
    try {
      const cached = JSON.parse(sessionStorage.getItem(GEO_CACHE_KEY))
      if (cached && cached.data) data = cached.data
    } catch {}
  }
  if (!data) data = { state: "ZZ", city: "ZZ", city_full: "", state_full: "" }
  try {
    sessionStorage.setItem(GEO_CACHE_KEY, JSON.stringify({ data, expires: Date.now() + GEO_CACHE_TTL }))
  } catch {}
  return data
}

// =========================================================
// BATERIA (opcional)
// =========================================================
async function medirBateria(){
  if(!CONFIG.medirBateria) return { bateria: "", carregando: "" }
  try {
    const bat = await navigator.getBattery()
    const pct  = Math.round(bat.level * 10)
    return { bateria: pct < 2 ? "BL" : "B" + pct, carregando: bat.charging ? "C1" : "C0" }
  } catch { return { bateria: "", carregando: "" } }
}

function getCookie(name){
  const m = document.cookie.match(new RegExp('(^| )'+name+'=([^;]+)'))
  return m ? m[2] : ""
}

// =========================================================
// DADOS SINCRONOS (sempre capturados)
// =========================================================
const tema   = window.matchMedia('(prefers-color-scheme: dark)').matches ? "D" : "L"
const ua     = navigator.userAgent || ""
const device = /android/i.test(ua) ? "A" : /iphone|ipad|ipod/i.test(ua) ? "I" : "O"
const vib    = navigator.vibrate ? "V1" : "V0"
const conexao = (() => {
  const c = navigator.connection
  if(!c) return "U"
  if(c.type==="wifi") return "W"
  if(c.type==="cellular") return "M"
  return "U"
})()

// =========================================================
// MEDIÇÕES PARALELAS (apenas geo e bateria)
// =========================================================
const promisesArray = []
if(CONFIG.medirBateria) promisesArray.push(timeout(medirBateria(), 200, { bateria:"", carregando:"" }))
else promisesArray.push(Promise.resolve({ bateria:"", carregando:"" }))
if(CONFIG.medirGeo) promisesArray.push(timeout(medirGeo(), 2500, { state:"ZZ", city:"ZZ", city_full:"", state_full:"" }))
else promisesArray.push(Promise.resolve({ state:"ZZ", city:"ZZ", city_full:"", state_full:"" }))

const [batObj, geo] = await Promise.all(promisesArray)

const stateTag = geo.state
const cityTag  = geo.city

// =========================================================
// DADOS TEMPORAIS E PARIDADE
// =========================================================
let paridadeTag = null
if(ENABLE_PARIDADE){
  const agora = new Date()
  paridadeTag = agora.getMinutes() % 2 === 0 ? "Par" : "Impar"
}

const agoraData  = new Date()
const hora       = agoraData.getHours()
const minuto     = agoraData.getMinutes()
const segundo    = agoraData.getSeconds()
const dia        = agoraData.getDate()
const diaSemana  = ["Domingo","Segunda","Terca","Quarta","Quinta","Sexta","Sabado"][agoraData.getDay()]

const minDezena  = Math.floor(minuto/10) % 2 === 0 ? "Par" : "Impar"
const minUnidade = (minuto%10) % 2 === 0 ? "Par" : "Impar"
const segMetade  = segundo <= 30 ? "Seg0030" : "Seg3160"
const horaPar    = hora % 2 === 0 ? "Par" : "Impar"
const diaPar     = dia  % 2 === 0 ? "Par" : "Impar"

let periodo = "Noite"
if(hora >= 6  && hora <= 11) periodo = "Manha"
else if(hora >= 12 && hora <= 17) periodo = "Tarde"

const bNum = parseInt((batObj.bateria.match(/\d+/)||[0])[0])
const bPar = isNaN(bNum) ? null : (bNum%2===0?"Par":"Impar")

// ========== LEITURA INTELIGENTE DO _fbp ==========
async function getFbpWithRetry(maxTentativas = 5, intervaloMs = 100) {
  for (let i = 0; i < maxTentativas; i++) {
    const fbp = getCookie("_fbp");
    if (fbp && fbp !== "") return fbp;
    await new Promise(r => setTimeout(r, intervaloMs));
  }
  return "";
}
const fbpValue = await getFbpWithRetry(5, 100);
const FBP = (fbpValue !== "") ? 1 : 0;
const fbcValue = getCookie("_fbc") || params.get("fbclid") || "";
const FBC = (fbcValue !== "") ? 1 : 0;

const baseUC   = UC.replace(/[^a-zA-Z0-9]/g, "").slice(0, 16)
const tempoTag = "T1"

let horaTag
const hp = 20
if(hp===1){
  horaTag = "H" + String(hora).padStart(2,"0")
} else {
  const bucket = Math.min(Math.floor(minuto*hp/60), hp-1)
  horaTag = "H" + String(hora).padStart(2,"0") + "M" + bucket
}

// =========================================================
// EVENTOS META (sem velocidade, movimento, ram, webrtc)
// =========================================================
if(CONFIG.enviarEventosMeta){
  const eventosBasicos = [
    tempoTag,
    batObj.bateria, batObj.carregando,
    tema, device, vib, conexao,
    placementTag, sourceTag,
    stateTag, cityTag,
    minDezena, minUnidade, segMetade, horaPar,
    diaSemana, diaPar, periodo,
    (bPar!==null?bPar:""),
    "FBP"+FBP, "FBC"+FBC
  ]
  if(ENABLE_PARIDADE && paridadeTag) eventosBasicos.push(paridadeTag)
  eventosBasicos.forEach(enviarEvento)
  enviarEvento(horaTag)
}

// =========================================================
// MONTAGEM DO UC FINAL (sem velTag, movimento, redeTag, ram)
// =========================================================
const idTag = "ID" + userId
const corpoParts = [
  baseUC,
  batObj.bateria,
  batObj.carregando,
  tema,
  device,
  conexao,
  placementTag,
  sourceTag,
  stateTag,
  cityTag
]
const corpo       = corpoParts.join("").replace(/[^a-zA-Z0-9]/g, "")
const MAX         = 50
const espacoCorpo = MAX - idTag.length
const corpoFinal  = corpo.slice(0, espacoCorpo)
const finalUC     = corpoFinal + idTag

// =========================================================
// DEBUG
// =========================================================
if(CONFIG.debug){
  alert(
    "=== DEBUG ===\n" +
    "stateTag:   [" + stateTag      + "] (" + geo.state_full + ")\n" +
    "cityTag:    [" + cityTag       + "] (" + geo.city_full  + ")\n" +
    "placement:  [" + placementTag  + "]\n" +
    "source:     [" + sourceTag     + "]\n" +
    "horaTag:    [" + horaTag       + "]\n" +
    "finalUC:    [" + finalUC       + "] (" + finalUC.length + " chars)\n" +
    "userId:     [" + userId        + "]\n" +
    "_fbp:       [" + fbpValue      + "]"
  )
}

// =========================================================
// ENVIO PARA GOOGLE SHEETS (sem dados de velocidade, etc)
// =========================================================
if(CONFIG.enviarGoogleSheets){
  try {
    const agora     = new Date()
    const data_hora = agora.toLocaleString("pt-BR",{timeZone:"America/Sao_Paulo"})
    const payload   = {
      data_hora,
      external_id : userId,
      fbc         : fbcValue,
      fbp         : fbpValue,
      placement   : placementTag,
      source      : sourceTag,
      device,
      conexao,
      state       : stateTag,
      state_full  : geo.state_full,
      city        : cityTag,
      city_full   : geo.city_full,
      uc_completo : finalUC,
      min_dezena  : minDezena,
      min_unidade : minUnidade,
      seg_metade  : segMetade,
      hora_par    : horaPar,
      dia_semana  : diaSemana,
      dia_par     : diaPar,
      periodo,
      b_par       : bPar,
      fbp_flag    : FBP,
      fbc_flag    : FBC,
      bateria     : batObj.bateria,
      carregando  : batObj.carregando,
      tema
    }
    if(ENABLE_PARIDADE && paridadeTag) payload.paridade = paridadeTag

    const blob = new Blob([JSON.stringify(payload)], { type: "application/json" })
    if (navigator.sendBeacon) {
      navigator.sendBeacon(SHEETS_URL, blob)
    } else {
      fetch(SHEETS_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload),
        keepalive: true
      }).catch(()=>{})
    }
  } catch(e){}
}

// =========================================================
// REDIRECT
// =========================================================
const url = `https://shopee-utm-tracker.onrender.com/?link=${encodeURIComponent(LINK)}&uc=${finalUC}`
setTimeout(() => { window.location.href = url }, 600)

})();
</script>
</body>
</html>
