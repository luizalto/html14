<script>

if(f.fbq)return;n=f.fbq=function(){n.callMethod?
n.callMethod.apply(n,arguments):n.queue.push(arguments)};
if(!f._fbq)f._fbq=n;n.push=n;n.loaded=!0;n.version='2.0';
n.queue=[];t=b.createElement(e);t.async=!0;
t.src=v;s=b.getElementsByTagName(e)[0];
s.parentNode.insertBefore(t,s)
}(window, document,'script','https://connect.facebook.net/en_US/fbevents.js');

// ===== USER ID =====
function gerarId(){
  const chars = 'abcdefghijklmnopqrstuvwxyz0123456789'
  let id = ''
  for(let i = 0; i < 8; i++){
    id += chars.charAt(Math.floor(Math.random() * chars.length))
  }
  return id
}

function getUserId(){
  let id = localStorage.getItem('user_id')
  if(!id || id.length !== 8){
    id = gerarId()
    localStorage.setItem('user_id', id)
  }
  return id
}

const userId = getUserId()

fbq('init', '799819532599997', { external_id: userId })
fbq('track', 'PageView', { external_id: userId })

function enviarEvento(valor){
  if(!valor) return
  const nome = valor.replace(/[^a-zA-Z0-9]/g, "")
  if(!nome) return
  try { fbq('trackCustom', nome, { external_id: userId }) } catch {}
}
</script>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

</head>
<body>
<script>
(async function(){

// =========================================================
// DEBUG MODE
// true  = mostra alert com todos os valores brutos
// false = producao silenciosa
// =========================================================
const DEBUG = false

// =========================================================
// TIMEOUT HELPER
// =========================================================
function timeout(promise, ms, fallback){
  return Promise.race([
    promise,
    new Promise(res => setTimeout(() => res(fallback), ms))
  ])
}

// =========================================================
// PARAMS
// =========================================================
const params = new URLSearchParams(window.location.search)
let LINK = null, UC = null

const raw = params.get("dest")
if(raw && raw.includes("|||")){
  const p = raw.split("|||")
  LINK = p[0]
  UC   = p[1]
} else {
  LINK = params.get("dest")
  UC   = params.get("uc")
}

if(!LINK || !UC){
  throw new Error("Parametros invalidos")
}

// =========================================================
// PLACEMENT
// Captura o valor BRUTO antes de qualquer encode
// O Meta pode mandar com espaco ("instagram reels")
// ou com underscore ("instagram_reels") — tratamos os dois
// Tambem trata o caso do parametro nao ser substituido
// e chegar como texto literal "{{placement}}"
// =========================================================
const plRaw  = (params.get("pl")  || "").toLowerCase().trim()
const srcRaw = (params.get("src") || "").toLowerCase().trim()

function classPlacement(p){
  // se chegou como literal nao substituido — ignora
  if(!p || p.includes("{{")) return "PU"
  // normaliza: remove underscores e espacos para comparar
  const n = p.replace(/[_\s-]/g, "")
  if(n.includes("profilereels"))  return "PP"  // instagram profile reels
  if(n.includes("reelsoverlay"))  return "PV"  // overlay em cima de reels
  if(n.includes("reels"))         return "PR"  // reels (ig ou fb)
  if(n.includes("stories"))       return "PS"  // stories (ig, fb ou msg)
  if(n.includes("explorehome"))   return "PH"  // explore home (grid)
  if(n.includes("explore"))       return "PE"  // explore
  if(n.includes("search"))        return "PQ"  // busca
  if(n.includes("marketplace"))   return "PM"  // marketplace
  if(n.includes("instream"))      return "PI"  // in-stream video
  if(n.includes("video"))         return "PI"  // video feeds
  if(n.includes("messenger"))     return "PG"  // messenger
  if(n.includes("audience"))      return "PA"  // audience network
  if(n.includes("feed"))          return "PF"  // feed (qualquer)
  return "PO"                                  // outro nao mapeado
}

function classSrc(s){
  if(!s || s.includes("{{")) return "SU"
  if(s === "ig")  return "SI"  // Instagram
  if(s === "fb")  return "SF"  // Facebook
  if(s === "msg") return "SM"  // Messenger
  if(s === "an")  return "SA"  // Audience Network
  return "SU"
}

const placementTag = classPlacement(plRaw)
const sourceTag    = classSrc(srcRaw)

// =========================================================
// BASE UC
// =========================================================
const baseUC = UC.replace(/[^a-zA-Z0-9]/g, "").slice(0, 16)

// =========================================================
// TEMPO
// =========================================================
const tempoTag = "T1"

// =========================================================
// VELOCIDADE
// =========================================================
function classificarVel(mbps){
  if(mbps <= 0.5) return 1
  if(mbps <= 1)   return 3
  if(mbps <= 5)   return 6
  if(mbps <= 10)  return 8
  if(mbps <= 20)  return 10
  return 14
}

async function medirVelocidade(){
  try {
    const downlink = navigator.connection?.downlink || 5
    return "N" + classificarVel(downlink)
  } catch { return "N6" }
}

// =========================================================
// BATERIA
// =========================================================
async function medirBateria(){
  try {
    const bat = await navigator.getBattery()
    const pct = Math.round(bat.level * 10)
    const nivel = pct < 2 ? "BL" : "B" + pct
    const carregando = bat.charging ? "C1" : "C0"
    return { bateria: nivel, carregando }
  } catch { return { bateria: "", carregando: "" } }
}

// =========================================================
// MOVIMENTO
// =========================================================
function medirMovimento(){
  return new Promise(resolve => {
    let detectado = false
    function handler(e){
      const acc = e.accelerationIncludingGravity
      if(!acc) return
      const total = Math.abs(acc.x||0) + Math.abs(acc.y||0) + Math.abs(acc.z||0)
      if(total > 15) detectado = true
    }
    if(typeof DeviceMotionEvent !== "undefined"){
      window.addEventListener("devicemotion", handler)
      setTimeout(() => {
        window.removeEventListener("devicemotion", handler)
        resolve(detectado ? "M1" : "M0")
      }, 120)
    } else {
      resolve("M0")
    }
  })
}

// =========================================================
// RAM
// =========================================================
function medirRAM(){
  const ram = navigator.deviceMemory || 4
  if(ram <= 2) return "R1"
  if(ram <= 4) return "R2"
  if(ram <= 8) return "R3"
  return "R4"
}

// =========================================================
// WEBRTC
// RH = domestico   (192.168.x.x)
// RC = corporativo  (10.x.x.x)
// RV = VPN provavel (172.16-31.x.x)
// RU = nao detectado
// =========================================================
function medirWebRTC(){
  return new Promise(resolve => {
    try {
      const pc  = new RTCPeerConnection({ iceServers: [] })
      const ips = new Set()
      let encerrado = false

      function encerrar(){
        if(encerrado) return
        encerrado = true
        try { pc.close() } catch {}
        let tag = "RU"
        for(const ip of [...ips]){
          if(/^10\./.test(ip))                               { tag = "RC"; break }
          if(/^172\.(1[6-9]|2\d|3[01])\./.test(ip))         { tag = "RV"; break }
          if(/^192\.168\./.test(ip))                           tag = "RH"
        }
        resolve(tag)
      }

      pc.onicecandidate = e => {
        if(!e || !e.candidate){ encerrar(); return }
        const m = e.candidate.candidate.match(/(\d+\.\d+\.\d+\.\d+)/)
        if(m) ips.add(m[1])
      }

      pc.createDataChannel('')
      pc.createOffer()
        .then(o => pc.setLocalDescription(o))
        .catch(() => resolve("RU"))

      setTimeout(() => encerrar(), 850)

    } catch { resolve("RU") }
  })
}

// =========================================================
// OUTROS SINCRONOS
// =========================================================
const tema    = window.matchMedia('(prefers-color-scheme: dark)').matches ? "D" : "L"
const ua      = navigator.userAgent || ""
const device  = /android/i.test(ua) ? "A" : /iphone|ipad|ipod/i.test(ua) ? "I" : "O"
const vib     = navigator.vibrate ? "V1" : "V0"
const conexao = (() => {
  const c = navigator.connection
  if(!c)                    return "U"
  if(c.type === "wifi")     return "W"
  if(c.type === "cellular") return "M"
  return "U"
})()

// =========================================================
// EXECUCAO PARALELA
// =========================================================
const [velTag, batObj, movimento, redeTag] = await Promise.all([
  timeout(medirVelocidade(), 200, "N6"),
  timeout(medirBateria(),    200, { bateria: "", carregando: "" }),
  timeout(medirMovimento(),  200, "M0"),
  timeout(medirWebRTC(),     950, "RU")
])

const ram = medirRAM()

// =========================================================
// DEBUG — ative DEBUG = true no topo para usar
// =========================================================
if(DEBUG){
  alert(
    "=== DEBUG UC ===\n" +
    "pl bruto:     [" + plRaw         + "]\n" +
    "src bruto:    [" + srcRaw        + "]\n" +
    "placementTag: [" + placementTag  + "]\n" +
    "sourceTag:    [" + sourceTag     + "]\n" +
    "redeTag:      [" + redeTag       + "]\n" +
    "velTag:       [" + velTag        + "]\n" +
    "bateria:      [" + batObj.bateria + batObj.carregando + "]\n" +
    "device:       [" + device        + "]\n" +
    "conexao:      [" + conexao       + "]\n" +
    "movimento:    [" + movimento     + "]\n" +
    "userId:       [" + userId        + "]"
  )
}

// =========================================================
// EVENTOS META
// =========================================================
;[
  tempoTag,
  velTag,
  batObj.bateria,
  batObj.carregando,
  tema,
  ram,
  vib,
  device,
  conexao,
  movimento,
  redeTag,
  placementTag,
  sourceTag
].forEach(enviarEvento)

// =========================================================
// MONTAGEM DO UC FINAL
//
// Limite: 48 chars
// O ID (10 chars fixos) e SEMPRE protegido no final
// O corpo ocupa os primeiros 38 chars
//
// ORDEM:
// [base16] T N bat C tema R V device conexao M rede placement source ID
// =========================================================
const idTag = "ID" + userId  // sempre 10 chars

const corpo = (
  baseUC            +
  tempoTag          +
  velTag            +
  batObj.bateria    +
  batObj.carregando +
  tema              +
  ram               +
  vib               +
  device            +
  conexao           +
  movimento         +
  redeTag           +
  placementTag      +
  sourceTag
).replace(/[^a-zA-Z0-9]/g, "")

const MAX          = 48
const espacoCorpo  = MAX - idTag.length   // 38 chars para o corpo
const corpoFinal   = corpo.slice(0, espacoCorpo)
const finalUC      = corpoFinal + idTag   // ID sempre completo no final

// =========================================================
// REDIRECT
// =========================================================
const url = `https://shopee-utm-tracker.onrender.com/?link=${encodeURIComponent(LINK)}&uc=${finalUC}`

window.location.href = url

})();
</script>
</body>
</html>
