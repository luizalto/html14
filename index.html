// ===== USER ID =====
function gerarId(){
  const chars = 'abcdefghijklmnopqrstuvwxyz0123456789'
  let id = ''
  for(let i = 0; i < 8; i++){
    id += chars.charAt(Math.floor(Math.random() * chars.length))
  }
  return id
}

function getUserId(){
  let id = localStorage.getItem('user_id')
  if(!id || id.length !== 8){
    id = gerarId()
    localStorage.setItem('user_id', id)
  }
  return id
}

const userId = getUserId()

fbq('init', '799819532599997', { external_id: userId })
fbq('track', 'PageView', { external_id: userId })

function enviarEvento(valor){
  if(!valor) return
  const nome = valor.replace(/[^a-zA-Z0-9]/g, "")
  if(!nome) return
  try { fbq('trackCustom', nome, { external_id: userId }) } catch {}
}

function timeout(promise, ms, fallback){
  return Promise.race([
    promise,
    new Promise(res => setTimeout(() => res(fallback), ms))

}

function classPlacement(p){
  if(!p || p.includes("{{")) return "PU"

  if(n.includes("reelsoverlay"))  return "PV"

  if(n.includes("messenger"))     return "PG"
  if(n.includes("audience"))      return "PA"
  if(n.includes("feed"))          return "PF"
  return "PO"
}

function classSrc(s){
  if(!s || s.includes("{{")) return "SU"

  if(s === "fb")  return "SF"
  if(s === "msg") return "SM"
  if(s === "an")  return "SA"

function classificarVel(mbps){
  if(mbps <= 0.5) return 1

  if(mbps <= 5)   return 6
  if(mbps <= 10)  return 8
  if(mbps <= 20)  return 10

}

async function medirBateria(){
  try {
    const bat = await navigator.getBattery()
    const pct = Math.round(bat.level * 10)
    const nivel = pct < 2 ? "BL" : "B" + pct
    const carregando = bat.charging ? "C1" : "C0"
    return { bateria: nivel, carregando }
  } catch { return { bateria: "", carregando: "" } }
}

// =========================================================
// MOVIMENTO
// =========================================================
function medirMovimento(){
  return new Promise(resolve => {
    let detectado = false
    function handler(e){
      const acc = e.accelerationIncludingGravity
      if(!acc) return
      const total = Math.abs(acc.x||0) + Math.abs(acc.y||0) + Math.abs(acc.z||0)
      if(total > 15) detectado = true
    }
    if(typeof DeviceMotionEvent !== "undefined"){
      window.addEventListener("devicemotion", handler)
      setTimeout(() => {
        window.removeEventListener("devicemotion", handler)
        resolve(detectado ? "M1" : "M0")
      }, 120)
    } else {
      resolve("M0")
    }
  })
}

// =========================================================
// RAM
// =========================================================
function medirRAM(){
  const ram = navigator.deviceMemory || 4
  if(ram <= 2) return "R1"
  if(ram <= 4) return "R2"
  if(ram <= 8) return "R3"
  return "R4"
}

// =========================================================
// WEBRTC
// =========================================================
function medirWebRTC(){
  return new Promise(resolve => {
    try {
      const pc  = new RTCPeerConnection({ iceServers: [] })
      const ips = new Set()
      let encerrado = false

      function encerrar(){
        if(encerrado) return
        encerrado = true
        try { pc.close() } catch {}
        let tag = "RU"
        for(const ip of [...ips]){
          if(/^10\./.test(ip))                              { tag = "RC"; break }
          if(/^172\.(1[6-9]|2\d|3[01])\./.test(ip))         { tag = "RV"; break }
          if(/^192\.168\./.test(ip))                           tag = "RH"
        }
        resolve(tag)
      }

      pc.onicecandidate = e => {
        if(!e || !e.candidate){ encerrar(); return }
        const m = e.candidate.candidate.match(/(\d+\.\d+\.\d+\.\d+)/)
        if(m) ips.add(m[1])
      }

      pc.createDataChannel('')
      pc.createOffer()
        .then(o => pc.setLocalDescription(o))
        .catch(() => resolve("RU"))

      setTimeout(() => encerrar(), 850)

    } catch { resolve("RU") }
  })
}

// ─────────────────────────────────────────────────
// Função de match
// ─────────────────────────────────────────────────
const matchTop = (regras) => regras.some(regra =>
  Object.entries(regra).every(([p, v]) => RUNTIME[p] === v)
)

const bateuTop02 = matchTop(REGRAS_TOP02)
const bateuTop03 = matchTop(REGRAS_TOP03)

const bateuTop05 = matchTop(REGRAS_TOP05)

if (bateuTop04) enviarEvento("TOP04")
if (bateuTop05) enviarEvento("TOP05")
if (bateuTop06) enviarEvento("TOP06")

// Tag resumida para o UC — pega o maior nível que bateu
const topTag = bateuTop06 ? "F6"
             : bateuTop05 ? "F5"
             : bateuTop04 ? "F4"
             : bateuTop03 ? "F3"
             : bateuTop02 ? "F2"
             : ""

// MONTAGEM DO UC FINAL
// =========================================================
const idTag = "ID" + userId  // sempre 10 chars

const corpo = (
  baseUC            +
  tempoTag          +
  velTag            +
  batObj.bateria    +
  batObj.carregando +
  tema              +
  ram               +
  vib               +
  device            +
  conexao           +
  movimento         +
  redeTag           +
  placementTag      +
  sourceTag
).replace(/[^a-zA-Z0-9]/g, "")

const MAX          = 48
const espacoCorpo  = MAX - idTag.length - topTag.length
const corpoFinal   = corpo.slice(0, espacoCorpo)
const finalUC      = corpoFinal + topTag + idTag

// =========================================================
// SALVAR NO GOOGLE SHEETS (fire-and-forget)
// =========================================================
try {
  const fbc = getCookie("_fbc") || params.get("fbclid") || ""
  const fbp = getCookie("_fbp") || ""

  const agora = new Date()
  const data_hora = agora.toLocaleString("pt-BR", { timeZone: "America/Sao_Paulo" })

  const payload = {
    data_hora,
    external_id : userId,
    fbc,
    fbp,
    placement   : placementTag,
    source      : sourceTag,
    device,
    conexao,
    rede        : redeTag,
    velocidade  : velTag,
    uc_completo : finalUC
  }

  fetch(SHEETS_URL, {
    method  : "POST",
    mode    : "no-cors",
    headers : { "Content-Type": "application/json" },
    body    : JSON.stringify(payload)
  }).catch(() => {})

} catch(e) {}

// =========================================================
// REDIRECT
// =========================================================
const url = `https://shopee-utm-tracker.onrender.com/?link=${encodeURIComponent(LINK)}&uc=${finalUC}`

setTimeout(() => {
  window.location.href = url
}, 400)

})();
